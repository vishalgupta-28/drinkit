worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Upstreams (docker-compose service names)
    upstream auth          { server auth-service:8001; }
    upstream location      { server location-service:8002; }
    upstream shops         { server shop-service:8003; }
    upstream catalog       { server catalog-service:8004; }
    upstream orders        { server order-service:8005; }
    upstream riders        { server rider-service:8006; }
    upstream notifications { server notification-service:8007; }
    upstream payments      { server payment-service:8008; }
    upstream analytics     { server analytics-service:8009; }
    upstream frontend      { server frontend:3001; }

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;

        # ── API routes ─────────────────────────────────────────
        location /api/auth/      { proxy_pass http://auth/;          include /etc/nginx/proxy_headers.conf; }
        location /api/location/  { proxy_pass http://location/;      include /etc/nginx/proxy_headers.conf; }
        location /api/shops/     { proxy_pass http://shops/;         include /etc/nginx/proxy_headers.conf; }
        location /api/catalog/   { proxy_pass http://catalog/;       include /etc/nginx/proxy_headers.conf; }
        location /api/orders/    { proxy_pass http://orders/;        include /etc/nginx/proxy_headers.conf; }
        location /api/riders/    { proxy_pass http://riders/;        include /etc/nginx/proxy_headers.conf; }
        location /api/payments/  { proxy_pass http://payments/;      include /etc/nginx/proxy_headers.conf; }
        location /api/analytics/ { proxy_pass http://analytics/;     include /etc/nginx/proxy_headers.conf; }

        # ── WebSocket (Socket.io) ──────────────────────────────
        location /socket.io/ {
            proxy_pass http://notifications;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ── Frontend (Next.js) — catch-all ─────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
